<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>필즈 혼합계산기</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .usage-info {
            margin-bottom: 15px;
            font-size: 16px;
            color: #555;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        #feedback {
            padding: 15px;
            background-color: #f0f8ff;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        h3 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }
        .history-list {
            list-style: none;
            padding: 0;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 5px;
        }
        .history-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            background-color: #fafafa;
        }
        .history-list li:last-child {
            border-bottom: none;
        }
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 필즈 혼합계산기</h2>
    
    <div class="usage-info">
        <strong>총 사용 횟수: <span id="usage-count">0</span>회</strong>
    </div>

    <div class="input-group">
        <input type="text" id="expression" placeholder="계산식을 입력하세요 (예: 2 * (3 + 4))">
        <input type="number" id="expected-answer" placeholder="예상되는 결과를 입력하세요 (선택사항)">
        <button onclick="calculate()">계산 및 확인하기</button>
    </div>
